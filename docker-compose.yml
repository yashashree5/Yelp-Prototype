services:
  # MongoDB placeholder for teammate's work (recommended for Lab 2 Part 3)
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  user-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.user
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev_secret}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017}
      - MONGODB_DB=${MONGODB_DB:-yelp_prototype}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - DATABASE_URL=${DATABASE_URL:-mysql+pymysql://root:password@mysql:3306/yelp_db}
    ports:
      - "8001:8001"
    depends_on:
      - mongo
      - kafka

  owner-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.owner
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev_secret}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017}
      - MONGODB_DB=${MONGODB_DB:-yelp_prototype}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - DATABASE_URL=${DATABASE_URL:-mysql+pymysql://root:password@mysql:3306/yelp_db}
    ports:
      - "8002:8002"
    depends_on:
      - mongo
      - kafka

  restaurant-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.restaurant
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev_secret}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017}
      - MONGODB_DB=${MONGODB_DB:-yelp_prototype}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - DATABASE_URL=${DATABASE_URL:-mysql+pymysql://root:password@mysql:3306/yelp_db}
    ports:
      - "8003:8003"
    depends_on:
      - mongo
      - kafka

  review-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.review
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev_secret}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017}
      - MONGODB_DB=${MONGODB_DB:-yelp_prototype}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - DATABASE_URL=${DATABASE_URL:-mysql+pymysql://root:password@mysql:3306/yelp_db}
    ports:
      - "8004:8004"
    depends_on:
      - mongo
      - kafka

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - user-service
      - restaurant-service
      - review-service
      - owner-service

volumes:
  mongo_data:

