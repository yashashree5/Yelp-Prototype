server {
    listen 80;

    # Serve React frontend
    root /usr/share/nginx/html;
    index index.html;

    # All /auth/* → user-service (8001)
    location /auth/ {
        proxy_pass http://user-service:8001/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # /users/* → user-service (8001)
    location /users/ {
        proxy_pass http://user-service:8001/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # /preferences/* → user-service (8001)
    location /preferences/ {
        proxy_pass http://user-service:8001/preferences/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # /favorites/* → user-service (8001)
    location /favorites/ {
        proxy_pass http://user-service:8001/favorites/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # /ai-assistant/* → user-service (8001)
    location /ai-assistant/ {
        proxy_pass http://user-service:8001/ai-assistant/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # /restaurants/* → restaurant-service (8003)
    location /restaurants/ {
        proxy_pass http://restaurant-service:8003/restaurants/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # /reviews/async/* → review-service (8004) — Kafka async endpoints
    location /reviews/async/ {
        proxy_pass http://review-service:8004/reviews/async/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # /reviews/* → review-service (8004)
    location /reviews/ {
        proxy_pass http://review-service:8004/reviews/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React router — serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
